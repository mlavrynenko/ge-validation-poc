---
name: CI

env:
  APP_ENV: ci
  DB_HOST: localhost
  DB_NAME: dummy
  DB_USER: dummy
  DB_PASSWORD: dummy

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    name: Validate code & templates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install yamllint ruff

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Lint YAML files
        run: |
          yamllint .github templates .pre-commit-config.yaml .yamllint.yml

      - name: Lint Python (ruff)
        run: |
          ruff check .

      - name: Validate environment configuration
        run: |
          python - <<EOF
          from core.settings import load_settings
          settings = load_settings()
          print("Loaded settings for env:", settings.APP_ENV)
          EOF

      - name: Verify imports
        run: |
          python - <<EOF
          import core.logging_config
          import template_engine.registry
          import template_engine.resolver
          import validation_engine.handler
          import validation_engine.validation
          print("Imports OK")
          EOF

      - name: Validate templates load correctly
        run: |
          python - <<EOF
          from template_engine.registry import TemplateRegistry
          registry = TemplateRegistry("templates")
          assert registry.templates, "No templates loaded"
          print(f"Loaded {len(registry.templates)} templates")
          EOF

      - name: Resolve templates (sanity check)
        run: |
          python - <<EOF
          from template_engine.registry import TemplateRegistry
          from template_engine.resolver import TemplateResolver

          registry = TemplateRegistry("templates")
          resolver = TemplateResolver(registry.templates)

          test_paths = [
              "s3://bucket/incoming/sales_test.xlsx",
              "s3://bucket/incoming/orders_test.parquet",
              "iceberg://glue.dq_iceberg_dev.orders",
          ]

          for path in test_paths:
              template = resolver.resolve(path)
              print(path, "→", template.template_id if template else "NO MATCH")
          EOF

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t data-validation-engine .

      - name: Smoke test container startup
        run: |
          docker run --rm \
            -e APP_ENV=ci \
            data-validation-engine --help
