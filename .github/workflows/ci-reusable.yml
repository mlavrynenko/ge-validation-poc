name: Data Quality Validation Framework CI

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.11"

      git-ref:
        description: Commit SHA or tag to build (used for promotions)
        type: string
        required: false

      deploy-environment:
        type: string
        default: "dev"

      templates-path:
        type: string
        default: "templates"

      docker-image-name:
        type: string
        default: "data-validation-engine"

      enable-docker-push:
        type: boolean
        default: false

      enable-release:
        type: boolean
        default: false

env:
  CHECKOUT_REF: ${{ inputs.git-ref || github.sha }}

  # App defaults
  APP_ENV: ci
  DB_HOST: localhost
  DB_NAME: dummy
  DB_USER: dummy
  DB_PASSWORD: dummy

jobs:
  lint:
    name: Lint code & YAML
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff yamllint

      - name: Lint Python (ruff)
        run: ruff check .

      - name: Lint YAML
        run: |
          yamllint \
            .github \
            ${{ inputs.templates-path }} \
            .pre-commit-config.yaml \
            .yamllint.yml

  engine-checks:
    name: Engine sanity checks
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate environment configuration
        run: |
          python - <<EOF
          from core.settings import load_settings
          settings = load_settings()
          print("Loaded settings for env:", settings.APP_ENV)
          EOF

      - name: Verify core imports
        run: |
          python - <<EOF
          import core.logging_config
          import template_engine.registry
          import template_engine.resolver
          import validation_engine.handler
          import validation_engine.validation
          print("Imports OK")
          EOF

  template-checks:
    name: Template validation
    runs-on: ubuntu-latest
    needs: engine-checks

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Load templates
        run: |
          python - <<EOF
          from template_engine.registry import TemplateRegistry
          registry = TemplateRegistry("${{ inputs.templates-path }}")
          assert registry.templates, "No templates loaded"
          print(f"Loaded {len(registry.templates)} templates")
          EOF

      - name: Validate templates structurally
        run: |
          python - <<EOF
          from template_engine.registry import TemplateRegistry
          registry = TemplateRegistry("${{ inputs.templates-path }}")
          registry.validate()
          print("Templates structurally valid")
          EOF

      - name: Resolve templates (sanity check)
        run: |
          python - <<EOF
          from template_engine.registry import TemplateRegistry
          from template_engine.resolver import TemplateResolver

          registry = TemplateRegistry("${{ inputs.templates-path }}")
          resolver = TemplateResolver(registry.templates)

          test_paths = [
              "s3://bucket/incoming/sales_test.xlsx",
              "s3://bucket/incoming/orders_test.parquet",
              "iceberg://glue.dq_iceberg_dev.orders",
          ]

          for path in test_paths:
              template = resolver.resolve(path)
              print(path, "→", template.template_id if template else "NO MATCH")
          EOF

  docker:
    name: Docker build & smoke test
    runs-on: ubuntu-latest
    needs: template-checks

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Build Docker image
        run: docker build -t ${{ inputs.docker-image-name }} .

      - name: Smoke test container startup
        run: |
          docker run --rm \
            -e APP_ENV=ci \
            ${{ inputs.docker-image-name }} --help

  docker-push:
    name: Push Docker image
    runs-on: ubuntu-latest
    needs: docker
    if: inputs.enable-docker-push == true

    environment:
      name: ${{ inputs.deploy-environment }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Build Docker image
        run: docker build -t ${{ inputs.docker-image-name }} .

      - name: Login to container registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | \
          docker login ${{ secrets.REGISTRY_HOST }} \
            -u "${{ secrets.REGISTRY_USER }}" \
            --password-stdin

      - name: Tag and push image
        run: |
          IMAGE=${{ secrets.REGISTRY_HOST }}/${{ inputs.docker-image-name }}
          docker tag ${{ inputs.docker-image-name }} $IMAGE:${{ github.sha }}
          docker push $IMAGE:${{ github.sha }}

  deployment-artifacts:
    name: Generate deployment metadata
    runs-on: ubuntu-latest
    needs: docker
    if: inputs.deploy-environment != 'dev'

    environment:
      name: ${{ inputs.deploy-environment }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Generate deployment metadata
        run: |
          cat <<EOF > deployment-${{ inputs.deploy-environment }}.json
          {
            "service": "data-quality-validation-engine",
            "environment": "${{ inputs.deploy-environment }}",
            "image": "${{ inputs.docker-image-name }}",
            "image_tag": "${{ github.sha }}",
            "git_ref": "${{ env.CHECKOUT_REF }}",
            "build_time": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "ci_run_id": "${{ github.run_id }}"
          }
          EOF

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-${{ inputs.deploy-environment }}
          path: deployment-${{ inputs.deploy-environment }}.json
          retention-days: 90

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - docker
      - deployment-artifacts
    if: |
      inputs.enable-release == true &&
      inputs.deploy-environment == 'prod' &&
      github.ref == 'refs/heads/main'

    environment:
      name: prod

    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Data Validation Engine v${{ github.run_number }}
          generate_release_notes: true
