---
extends: default

rules:
  line-length:
    max: 120
    level: warning

  indentation:
    spaces: 2
    indent-sequences: consistent

  trailing-spaces: enable

  truthy:
    allowed-values: ["true", "false", "on", "off"]

  document-start: disable

ignore: |
  .venv/
  .ruff_cache/
  gx/**
  test_data/**
  **/great_expectations.yml
