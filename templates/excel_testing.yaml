template_id: example_tabs
version: 2
file_type: excel
file_pattern: ".*incoming/Excel.*\\.xlsx$"

sheets:
  - name: Tab A
    required: true
    header_row: 1

    columns:
      col 1:
        required: true
        type: string
      col 2:
        required: true
        type: string
      col 3:
        required: true
        type: string
      col 4:
        required: true
        type: string
      col 5:
        required: true
        type: decimal
      col 6:
        required: true
        type: int
      col 7:
        required: true
        type: decimal
      col 8:
        required: true
        type: int
      col 9:
        required: true
        type: decimal
      col 10:
        required: true
        type: int

    rules:
      - name: not_null_required

      - name: positive
        columns: [col 5, col 7, col 9]

      - name: unique
        columns: [col 1]

      - name: distinct_values_in_set
        columns: [col 1]
        params:
          allowed_values: [E011, E012]
          mostly: 0.05 #At least 5% of rows must have values from this set

    expectation_suite:
      - tab_a_checks

  - name: Tab B
    required: true
    header_row: 8

    columns:
      col 1:
        required: true
        type: string
      col 2:
        required: true
        type: string
      col 3:
        required: true
        type: string
      col 4:
        required: true
        type: string
      col 5:
        required: true
        type: decimal
      col 6:
        required: true
        type: int
      col 7:
        required: true
        type: decimal
      col 8:
        required: true
        type: int
      col 9:
        required: true
        type: decimal
      col 10:
        required: true
        type: int

    rules:
      - name: not_null_required

      - name: positive
        columns: [col 5, col 7, col 9]

      - name: unique
        columns: [col 1]

    expectation_suite:
      - tab_b_checks
