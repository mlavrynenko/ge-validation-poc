template_id: orders_parquet
version: 1
file_type: parquet
file_pattern: ".*orders.*\\.parquet$"

sheets:
  - name: data
    required: true
    header_row: 1

    columns:
      id:
        required: true
        type: int
      order_amount:
        required: true
        type: decimal
      created_at:
        required: true
        type: date

    expectations:
      - not_null_required
      - positive_amounts
      - unique_id
      - valid_dates
