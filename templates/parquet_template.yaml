template_id: orders_parquet
version: 1
file_type: parquet
file_pattern: ".*orders.*\\.parquet$"

sheets:
  - name: data
    required: true
    header_row: 1

    columns:
      id:
        required: true
        type: int
      order_amount:
        required: true
        type: decimal
      created_at:
        required: true
        type: date

    rules:
      - name: not_null_required
      - name: positive
        columns: [order_amount]
      - name: unique
        columns: [id]
      - name: date_format
        columns: [created_at]
        params:
          format: "%Y-%m-%d"

    expectation_suite:
      - orders_parquet_checks
